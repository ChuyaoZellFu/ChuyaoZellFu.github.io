# Site Settings
title: Chuyao Fu
first_name: Chuyao
last_name: Fu
email: 12310306@mail.sustech.edu.cn
description: > # the ">" means to ignore newlines until the next key
  PhD Applicant in Robot Learning | World Models | Vision-Language-Action Models

baseurl: "" # the subpath of your site, e.g. /blog
url: "https://chuyaozellfu.github.io" # the base hostname & protocol for your site
github_username: ChuyaoZellFu
google_scholar: # leave blank for now
linkedin: # leave blank for now
twitter: # leave blank for now

# Build Settings
markdown: kramdown
highlighter: rouge
theme: jekyll-theme-minimal
plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-seo-tag

# Collections
collections:
  publications:
    output: true
    permalink: /:collection/:title/
  projects:
    output: true
    permalink: /:collection/:title/

# Default values
defaults:
  - scope:
      path: ""
      type: "publications"
    values:
      layout: "publication"
  - scope:
      path: ""
      type: "projects"
    values:
      layout: "project"

# Exclude from processing
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor
  - .bundle
  - .sass-cache
  - .jekyll-cache
  - .jekyll-metadata
